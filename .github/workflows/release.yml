name: Release Windows exe

# Збирає Windows-exe (Nuitka, без UPX) і публікує у GitHub Release.
# Тригер — пуш тегу версії, напр.:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # потрібно для створення Release

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Nuitka
        run: python -m pip install nuitka

      # Nuitka компілює Python у справжній C/exe — значно менше хибних
      # спрацювань антивірусів, ніж self-extracting PyInstaller. UPX не
      # використовуємо (теж тригер AV). Версійні метадані роблять exe
      # менш «підозрілим» для евристик.
      - name: Build exe (Nuitka, no UPX)
        working-directory: scripts
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --include-module=scenes `
            "--company-name=dz-vadim" `
            "--product-name=Adaptive Coffee Wallpaper" `
            "--file-version=1.0.0.0" `
            "--product-version=1.0.0.0" `
            "--file-description=Sets the desktop wallpaper by season, time and weather" `
            --output-dir=../dist `
            --output-filename=adaptive-wallpaper.exe `
            set_wallpaper.py

      - name: Package bundle (exe + wallpapers)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          Copy-Item dist/adaptive-wallpaper.exe bundle/
          Copy-Item -Recurse wallpapers bundle/wallpapers
          if (Test-Path docs/windows.md) { Copy-Item docs/windows.md bundle/README.txt }
          Compress-Archive -Path bundle/* -DestinationPath adaptive-wallpaper-windows.zip -Force

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/adaptive-wallpaper.exe
            adaptive-wallpaper-windows.zip
          body: |
            ## Windows build (Nuitka, unsigned)

            **adaptive-wallpaper-windows.zip** — exe + усі 48 шпалер. Розпакуй і
            запланируй у Task Scheduler (див. README.txt усередині).

            ℹ️ Збірка без code-signing. Якщо SmartScreen попередить —
            *More info → Run anyway*. Для повної довіри потрібен підписаний
            білд (окремий сертифікат).
