name: Release app binaries

# Збирає GUI-застосунок (трей) під Linux і Windows через Nuitka й публікує
# бінарники + бандл зі шпалерами в GitHub Release.
# Тригер — пуш тегу версії:  git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # потрібно для створення Release

jobs:
  # ---------------- Linux ----------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libxcb-cursor0
          python -m pip install nuitka PyQt6

      # Nuitka компілює у справжній C/ELF — менше хибних спрацювань захисту,
      # ніж self-extracting. PyQt6-плагін підтягує потрібні Qt-бібліотеки.
      - name: Build (Nuitka, PyQt6)
        working-directory: app
        run: |
          python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --enable-plugin=pyqt6 \
            --include-package-data=adaptive_wallpaper \
            --linux-icon=adaptive_wallpaper/assets/adaptive-wallpaper.png \
            --output-dir=../dist \
            --output-filename=adaptive-wallpaper \
            run.py

      - name: Package bundle (binary + wallpapers)
        run: |
          mkdir -p bundle
          cp dist/adaptive-wallpaper bundle/
          cp -r wallpapers bundle/wallpapers
          cp docs/app.md bundle/README.txt || true
          tar -C bundle -czf adaptive-wallpaper-linux.tar.gz .

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/adaptive-wallpaper
            adaptive-wallpaper-linux.tar.gz
          body: |
            ## Adaptive Coffee Wallpaper

            **Windows:**
            - **adaptive-wallpaper-setup.exe** — звичайний інсталятор (Inno Setup):
              ставить програму, ярлики, опційний автозапуск і розпаковує всі 48
              шпалер. Без прав адміністратора. **Рекомендовано.**
            - **adaptive-wallpaper-windows-portable.zip** — портативна версія
              (папка з exe + шпалери), без встановлення.

            **Linux:**
            - **adaptive-wallpaper-linux.tar.gz** — GUI-трей + усі 48 шпалер.
            - **adaptive-wallpaper** — окремий бінарник (без шпалер; вкажи теку
              або `--install`).

            Білди **без code-signing** — SmartScreen може попередити на першому
            запуску (*More info → Run anyway*). Standalone-збірка та інсталятор
            помітно знижують хибні спрацювання антивірусів порівняно з onefile.

  # ---------------- Windows ----------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install nuitka PyQt6

      # standalone (папка справжніх DLL), НЕ onefile: onefile розпаковується в
      # temp при кожному запуску, що тригерить евристики антивірусів. Папка +
      # підписаний-стилем інсталятор Inno Setup викликають значно менше підозр.
      - name: Build (Nuitka standalone, PyQt6, no console)
        working-directory: app
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=pyqt6 `
            --include-package-data=adaptive_wallpaper `
            --windows-icon-from-ico=adaptive_wallpaper/assets/adaptive-wallpaper.ico `
            --windows-console-mode=disable `
            "--company-name=dz-vadim" `
            "--product-name=Adaptive Coffee Wallpaper" `
            "--file-version=1.3.1.0" `
            "--product-version=1.3.1.0" `
            "--file-description=Sets the desktop wallpaper by season, time and weather" `
            --output-dir=../dist `
            --output-filename=adaptive-wallpaper.exe `
            run.py

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=1.3.1 windows\installer.iss

      - name: Portable zip (standalone + wallpapers)
        shell: pwsh
        run: |
          Copy-Item -Recurse wallpapers dist/run.dist/wallpapers
          if (Test-Path docs/app.md) { Copy-Item docs/app.md dist/run.dist/README.txt }
          Compress-Archive -Path dist/run.dist/* `
            -DestinationPath adaptive-wallpaper-windows-portable.zip -Force

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/adaptive-wallpaper-setup.exe
            adaptive-wallpaper-windows-portable.zip
