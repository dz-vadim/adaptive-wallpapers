name: Release app binaries

# Збирає GUI-застосунок (трей) під Linux і Windows через Nuitka й публікує
# бінарники + бандл зі шпалерами в GitHub Release.
# Тригер — пуш тегу версії:  git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # потрібно для створення Release

jobs:
  # ---------------- Linux ----------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libxcb-cursor0
          python -m pip install nuitka PyQt6

      # Nuitka компілює у справжній C/ELF — менше хибних спрацювань захисту,
      # ніж self-extracting. PyQt6-плагін підтягує потрібні Qt-бібліотеки.
      - name: Build (Nuitka, PyQt6)
        working-directory: app
        run: |
          python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --enable-plugin=pyqt6 \
            --include-package-data=adaptive_wallpaper \
            --linux-icon=adaptive_wallpaper/assets/adaptive-wallpaper.png \
            --output-dir=../dist \
            --output-filename=adaptive-wallpaper \
            run.py

      - name: Package bundle (binary + wallpapers)
        run: |
          mkdir -p bundle
          cp dist/adaptive-wallpaper bundle/
          cp -r wallpapers bundle/wallpapers
          cp docs/app.md bundle/README.txt || true
          tar -C bundle -czf adaptive-wallpaper-linux.tar.gz .

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/adaptive-wallpaper
            adaptive-wallpaper-linux.tar.gz
          body: |
            ## Adaptive Coffee Wallpaper — binaries

            - **adaptive-wallpaper-linux.tar.gz** / **adaptive-wallpaper-windows.zip**
              — GUI tray app + усі 48 шпалер. Розпакуй і запусти бінарник.
            - Окремі бінарники — без шпалер (вкажи теку в налаштуваннях або
              `--folder`, або поклади `wallpapers/` поруч).

            Перший запуск ставить шпалеру в трей; права адміністратора не потрібні.
            Білди **без code-signing** — SmartScreen/антивірус може попередити
            на першому запуску (*More info → Run anyway*).

  # ---------------- Windows ----------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install nuitka PyQt6

      - name: Build (Nuitka, PyQt6, no console)
        working-directory: app
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyqt6 `
            --include-package-data=adaptive_wallpaper `
            --windows-icon-from-ico=adaptive_wallpaper/assets/adaptive-wallpaper.ico `
            --windows-console-mode=disable `
            "--company-name=dz-vadim" `
            "--product-name=Adaptive Coffee Wallpaper" `
            "--file-version=1.1.0.0" `
            "--product-version=1.1.0.0" `
            "--file-description=Sets the desktop wallpaper by season, time and weather" `
            --output-dir=../dist `
            --output-filename=adaptive-wallpaper.exe `
            run.py

      - name: Package bundle (exe + wallpapers)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          Copy-Item dist/adaptive-wallpaper.exe bundle/
          Copy-Item -Recurse wallpapers bundle/wallpapers
          if (Test-Path docs/app.md) { Copy-Item docs/app.md bundle/README.txt }
          Compress-Archive -Path bundle/* -DestinationPath adaptive-wallpaper-windows.zip -Force

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/adaptive-wallpaper.exe
            adaptive-wallpaper-windows.zip
