<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Неонова вивіска-стакан кави (як на референсі COFFEE): золотий лінійний
       контур на темному синьо-зеленому тлі з палітри оригіналу. -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#122430"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="none"
        stroke="#1f3a48" stroke-width="1"/>

  <!-- м'яке неонове сяйво (ширший напівпрозорий контур) -->
  <g fill="none" stroke="#f2e7a0" stroke-opacity="0.28" stroke-width="5.5"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M25 16 C25 11 39 11 39 16"/>
    <path d="M22.5 16 H41.5 L40.5 22 H23.5 Z"/>
    <path d="M23 22 L26 51 Q32 54 38 51 L41 22"/>
  </g>

  <!-- основний золотий неон -->
  <g fill="none" stroke="#ecdf9a" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- купол кришки -->
    <path d="M25 16 C25 11 39 11 39 16"/>
    <!-- обідок кришки -->
    <path d="M22.5 16 H41.5 L40.5 22 H23.5 Z"/>
    <!-- лінія на кришці -->
    <path d="M26 18.6 H38"/>
    <!-- корпус стакана (звужується донизу) -->
    <path d="M23 22 L26 51 Q32 54 38 51 L41 22"/>
  </g>
</svg>
