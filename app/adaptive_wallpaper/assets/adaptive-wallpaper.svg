<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Неонова вивіска-стакан (одинарні гладкі лінії). Кришка: куполоподібний
       силует + еліптична основа + лінія-шов, що нависає над корпусом.
       Відблиск — окрема лінія ближче до центру. -->
  <rect x="3" y="3" width="58" height="58" rx="14" fill="#122430"/>

  <!-- неонове сяйво -->
  <g fill="none" stroke="#f4e89c" stroke-opacity="0.18" stroke-width="4.4"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M15.5 20 L18.8 10.8 Q19.6 9.2 22.2 9.1 L41.8 9.1 Q44.4 9.2 45.2 10.8 L48.5 20"/>
    <path d="M14.8 20 Q32 23.4 49.2 20"/>
    <path d="M17.6 15.6 Q32 18.2 46.4 15.6"/>
    <path d="M16.6 22.6 L22.6 53.5"/>
    <path d="M47.4 22.6 L41.4 53.5"/>
    <path d="M22.6 53.5 Q32 55.6 41.4 53.5"/>
    <path d="M28.4 27.5 Q27.1 36 28.3 45"/>
  </g>

  <!-- основний золотий неон -->
  <g fill="none" stroke="#ecdf92" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- купол кришки (силует) -->
    <path d="M15.5 20 L18.8 10.8 Q19.6 9.2 22.2 9.1 L41.8 9.1 Q44.4 9.2 45.2 10.8 L48.5 20"/>
    <!-- еліптична основа кришки -->
    <path d="M14.8 20 Q32 23.4 49.2 20"/>
    <!-- лінія-шов на кришці -->
    <path d="M17.6 15.6 Q32 18.2 46.4 15.6"/>
    <!-- прямі звужені боки корпусу (нижче нависає кришка) -->
    <path d="M16.6 22.6 L22.6 53.5"/>
    <path d="M47.4 22.6 L41.4 53.5"/>
    <!-- пласке дно -->
    <path d="M22.6 53.5 Q32 55.6 41.4 53.5"/>
    <!-- відблиск — окрема лінія, ближче до центру -->
    <path d="M28.4 27.5 Q27.1 36 28.3 45"/>
  </g>
</svg>
