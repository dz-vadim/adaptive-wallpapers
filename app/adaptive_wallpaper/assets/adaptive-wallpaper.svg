<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a634a"/>
      <stop offset="1" stop-color="#5b3d2c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3550"/>
      <stop offset="1" stop-color="#101622"/>
    </linearGradient>
  </defs>

  <!-- neon-ish rounded backdrop -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="none"
        stroke="#ff5fae" stroke-opacity="0.55" stroke-width="2"/>

  <!-- steam -->
  <g fill="none" stroke="#cfe3ff" stroke-width="3" stroke-linecap="round"
     stroke-opacity="0.9">
    <path d="M26 20 q-4 -5 0 -10"/>
    <path d="M38 20 q-4 -5 0 -10"/>
  </g>

  <!-- saucer -->
  <ellipse cx="32" cy="50" rx="20" ry="4.5" fill="#3e2b20"/>

  <!-- cup body -->
  <path d="M17 27 h30 v8 a15 15 0 0 1 -30 0 z" fill="url(#cup)"
        stroke="#3e2b20" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- handle -->
  <path d="M47 29 a8 8 0 0 1 0 14" fill="none" stroke="#3e2b20"
        stroke-width="3.5"/>

  <!-- coffee surface -->
  <ellipse cx="32" cy="28" rx="15" ry="3.4" fill="#2a1c14"/>
</svg>
