<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Неонова вивіска-стакан (як reference/icon.png та вивіска COFFEE):
       чистий лінійний контур, об'єм — через форму (перспективні еліпси),
       відблиск — окрема лінія. Без заливок і градієнтів. -->
  <rect x="3" y="3" width="58" height="58" rx="12" fill="#122430"/>

  <!-- м'яке неонове сяйво: ті самі лінії, ширші й напівпрозорі -->
  <g fill="none" stroke="#f4e89c" stroke-opacity="0.22" stroke-width="5"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M19.5 17 C20 10.5 44 10.5 44.5 17"/>
    <ellipse cx="32" cy="17" rx="12.5" ry="2.9"/>
    <ellipse cx="32" cy="22.4" rx="13.8" ry="3.1"/>
    <path d="M22 24.5 L25.6 50.5"/>
    <path d="M42 24.5 L38.4 50.5"/>
    <path d="M25.6 50.5 Q32 53.4 38.4 50.5"/>
  </g>

  <!-- основний золотий неон -->
  <g fill="none" stroke="#ecdf92" stroke-width="2.2"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- купол кришки -->
    <path d="M19.5 17 C20 10.5 44 10.5 44.5 17"/>
    <!-- обідок кришки (еліпс — дає об'єм) -->
    <ellipse cx="32" cy="17" rx="12.5" ry="2.9"/>
    <!-- ширша «губа» кришки, що нависає -->
    <ellipse cx="32" cy="22.4" rx="13.8" ry="3.1"/>
    <!-- корпус, що звужується донизу -->
    <path d="M22 24.5 L25.6 50.5"/>
    <path d="M42 24.5 L38.4 50.5"/>
    <!-- еліптичне дно -->
    <path d="M25.6 50.5 Q32 53.4 38.4 50.5"/>
  </g>

  <!-- відблиск — окрема коротка лінія на корпусі -->
  <path d="M27.5 29 Q26.4 35 27.4 41" fill="none" stroke="#fbf3c0"
        stroke-width="1.7" stroke-linecap="round" stroke-opacity="0.92"/>
</svg>
