<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8c5a3a"/>
      <stop offset="1" stop-color="#3a2417"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#ffcaa0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffcaa0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7eed8"/>
      <stop offset="1" stop-color="#e4d2af"/>
    </linearGradient>
  </defs>

  <!-- warm coffee backdrop, no outline -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#glow)"/>

  <!-- steam -->
  <g fill="none" stroke="#f7eed8" stroke-width="3" stroke-linecap="round"
     stroke-opacity="0.85">
    <path d="M27 19 q-5 -5 0 -10"/>
    <path d="M37 19 q-5 -5 0 -10"/>
  </g>

  <!-- handle -->
  <path d="M44 30 a9 9 0 0 1 0 15" fill="none" stroke="#f7eed8"
        stroke-width="5"/>

  <!-- cup body (light, high contrast on dark bg) -->
  <path d="M15 26 h30 v9 a15 15 0 0 1 -30 0 z" fill="url(#cup)"/>

  <!-- coffee surface -->
  <ellipse cx="30" cy="26" rx="15" ry="3.4" fill="#523019"/>

  <!-- saucer -->
  <ellipse cx="32" cy="50" rx="19" ry="3.4" fill="#2c1b10" fill-opacity="0.55"/>
</svg>
